<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Management Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .btn-green { background-color: #4CAF50; color: white; }
        .btn-green:hover { background-color: #43a047; color: white; }
        .filter-sidebar { background-color: #ffffff; border-right: 1px solid #dee2e6; min-height: 100vh; }
        
        /* Layout Container for login screens */
        .login-container {
            max-width: 400px;
            margin-top: 8%;
        }
    </style>
</head>
<body>

    <div class="container d-flex flex-column align-items-center">
        
        <div id="loginPage" class="card login-container shadow p-4 bg-white rounded border w-100">
            <h3 class="text-center mb-4 fw-bold text-dark">Staff Login</h3>
            <div id="loginError" class="alert alert-danger d-none" role="alert">
                Invalid Username or Password!
            </div>
            <form id="loginForm">
                <div class="mb-3">
                    <label for="username" class="form-label fw-semibold">Username</label>
                    <input type="text" class="form-control" id="username" placeholder="Enter username" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label fw-semibold">Password</label>
                    <input type="password" class="form-control" id="password" placeholder="Enter password" required>
                </div>
                <button type="submit" class="btn btn-green w-100 fw-bold mt-2">Login</button>
            </form>
            <div class="text-end mt-3">
                <a href="#" onclick="showSection('forgotPanel')" class="text-decoration-none small text-success fw-semibold">Forgot Password?</a>
            </div>
        </div>

        <div id="forgotPanel" class="card login-container shadow p-4 bg-white rounded border d-none w-100">
            <h4 class="fw-bold text-dark mb-3">Reset Password</h4>
            <p class="small text-muted bg-light p-2 rounded">Security Question:<br><strong>What was the name of your first school?</strong></p>
            <div class="mb-3">
                <label class="form-label small fw-semibold">Security Answer</label>
                <input type="text" id="resetAnswer" class="form-control" placeholder="Type your school name...">
            </div>
            <div class="mb-3">
                <label class="form-label small fw-semibold">New Password</label>
                <input type="password" id="resetNewPass" class="form-control" placeholder="Enter new password">
            </div>
            <button onclick="handlePasswordReset()" class="btn btn-green w-100 fw-bold mb-2">Apply Reset</button>
            <button onclick="showSection('loginPage')" class="btn btn-light w-100 btn-sm border">Back to Login</button>
        </div>

    </div>

    <div id="dashboardPage" class="container-fluid d-none">
        <div class="row bg-white p-3 border-bottom align-items-center">
            <div class="col-md-8 d-flex gap-2">
                <button class="btn btn-green fw-semibold">Add Row</button>
                <button class="btn btn-green fw-semibold">Download Template</button>
                <button class="btn btn-green fw-semibold">Import</button>
                <button class="btn btn-green fw-semibold">Export</button>
            </div>
            <div class="col-md-4 d-flex justify-content-end gap-2">
                <button class="btn btn-green fw-semibold">Compare</button>
                <button class="btn btn-green fw-semibold">Email</button>
                <button onclick="logout()" class="btn btn-outline-danger fw-semibold">Logout</button>
            </div>
        </div>

        <div class="row">
            <div class="col-md-3 p-4 filter-sidebar">
                <h5 class="mb-4 text-secondary">Filters</h5>
                
                <div class="mb-3">
                    <button class="btn btn-light w-100 text-start fw-bold text-dark" type="button" data-bs-toggle="collapse" data-bs-target="#brandFilter">
                        + Brands
                    </button>
                    <div class="collapse show mt-2 ps-2" id="brandFilter">
                        <div class="form-check"><input class="form-check-input" type="checkbox" id="b1"><label class="form-check-label">Samsung</label></div>
                        <div class="form-check"><input class="form-check-input" type="checkbox" id="b2"><label class="form-check-label">Apple</label></div>
                        <div class="form-check"><input class="form-check-input" type="checkbox" id="b3"><label class="form-check-label">Google</label></div>
                    </div>
                </div>

                <div class="mb-3">
                    <button class="btn btn-light w-100 text-start fw-bold text-dark" type="button" data-bs-toggle="collapse" data-bs-target="#priceFilter">
                        + Price Range
                    </button>
                    <div class="collapse show mt-2 ps-2" id="priceFilter">
                        <input type="range" class="form-range" min="0" max="100000" id="priceRange">
                        <div class="d-flex gap-2 mt-2">
                            <input type="text" class="form-control form-control-sm" placeholder="Min">
                            <input type="text" class="form-control form-control-sm" placeholder="Max">
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-9 p-4">
                <div class="table-responsive bg-white shadow-sm rounded border">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th style="width: 150px;">Action</th>
                                <th><input type="checkbox"></th>
                                <th>Product Name ^v</th>
                                <th>Brand ^v</th>
                                <th>QTY ^v</th>
                                <th>Price ^v</th>
                                <th>Rating ^v</th>
                            </tr>
                        </thead>
                        <tbody id="productTableBody">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Form credentials
        let currentPassword = "admin123";

        // Navigation Page View Control Router
        function showSection(panelId) {
            document.getElementById('loginPage').classList.add('d-none');
            document.getElementById('forgotPanel').classList.add('d-none');
            
            // Handle if panel targeted is dashboard
            if(panelId === 'dashboardPage') {
                document.getElementById('dashboardPage').classList.remove('d-none');
            } else {
                document.getElementById('dashboardPage').classList.add('d-none');
                document.getElementById(panelId).classList.remove('d-none');
            }
        }

        // Login Handler Submission
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const userInput = document.getElementById('username').value;
            const passInput = document.getElementById('password').value;
            const errorDiv = document.getElementById('loginError');

            if (userInput === "admin" && passInput === currentPassword) {
                errorDiv.classList.add('d-none');
                showSection('dashboardPage');
                fetchProducts(); // Load table rows
            } else {
                errorDiv.classList.remove('d-none');
            }
        });

        // Forgot Password Reset Operation
        function handlePasswordReset() {
            const answer = document.getElementById('resetAnswer').value;
            const newPassword = document.getElementById('resetNewPass').value;

            // Checking the answer case-insensitively
            if (answer.trim().toLowerCase() === "st. joseph") {
                if (newPassword.trim() === "") {
                    alert("Please enter a valid new password!");
                    return;
                }
                currentPassword = newPassword; // Overwrite current session password
                alert("Success! Password updated inside system runtime storage.");
                showSection('loginPage');
                document.getElementById('password').value = '';
            } else {
                alert("Error: Security verification answer matches incorrectly.");
            }
        }

        // Logout Session Handler
        function logout() {
            showSection('loginPage');
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
        }

        // Live Dynamic Fetch Query out of active C# endpoints
        async function fetchProducts() {
            try {
                const response = await fetch('http://localhost:5246/api/product');
                const products = await response.json();
                
                const tableBody = document.getElementById('productTableBody');
                tableBody.innerHTML = ''; 
                
                products.forEach(prod => {
                    const name = prod.f_PROD_NAME || prod.F_PROD_NAME;
                    const brand = prod.f_BRAND || prod.F_BRAND;
                    const qty = prod.f_QTY !== undefined ? prod.f_QTY : prod.F_QTY;
                    const price = prod.f_PRICE || prod.F_PRICE;
                    const rating = prod.f_PROD_RATING || prod.F_PROD_RATING;

                    const row = `
                        <tr>
                            <td>
                                <button class="btn btn-info btn-sm text-white fw-bold me-1">Edit</button>
                                <button class="btn btn-danger btn-sm fw-bold">Delete</button>
                            </td>
                            <td><input type="checkbox"></td>
                            <td class="fw-bold text-dark">${name}</td>
                            <td><span class="badge bg-secondary">${brand}</span></td>
                            <td>${qty}</td>
                            <td class="text-success fw-bold">Rs. ${Number(price).toLocaleString()}</td>
                            <td class="text-warning">★ ${rating || 'N/A'}</td>
                        </tr>
                    `;
                    tableBody.innerHTML += row;
                });
            } catch (error) {
                console.error("Error connecting to backend API framework:", error);
            }
        }
    </script>
</body>
</html>
